name: tests
on:
  push:
    branches:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Log in to DockerHub
        uses: docker/login-action@v3.4.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker Build & Push to DockerHub
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          push: true
          tags: |
            ivukotic/xcache-tester:latest
            ivukotic/xcache-tester:${{ github.sha }}

      # - name: Log in to Harbor
      #   uses: docker/login-action@v3.4.0
      #   with:
      #     registry: hub.opensciencegrid.org
      #     username: ${{ secrets.HARBOR_USERNAME }}
      #     password: ${{ secrets.HARBOR_PASSWORD }}

      # - name: Docker Build & Push to Harbor
      #   uses: docker/build-push-action@v6.18.0
      #   with:
      #     context: .
      #     push: true
      #     tags: |
      #       hub.opensciencegrid.org/atlas/xcache-tester:latest
      #       hub.opensciencegrid.org/atlas/xcache-tester:${{ github.sha }}

      - name: Repository Dispatch
        uses: peter-evans/repository-dispatch@v3.0.0
        with:
          token: ${{ secrets.AAAS_GITOPS_DEPLOY_TRIGGER }}
          repository: maniaclab/flux_apps
          event-type: gitops-uc-ls-xcache-tester-trigger
          client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}'
